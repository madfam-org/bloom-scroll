<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A perspective-driven content aggregator that counters doom scrolling">

  <!-- Deliberately NOT a PWA. The product thesis is "20 items then stop"
       — a browser-only slow-web aggregator. Setting mobile-web-app-capable
       + a standalone-display manifest causes Chrome/Android to prompt for
       "access to other apps and services on this device" during its
       install flow, which is both wrong and user-hostile for this product.
       No manifest link, no standalone meta tags. -->
  <title>Almanac — Slow Web</title>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
