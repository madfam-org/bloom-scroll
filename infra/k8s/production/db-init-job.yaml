apiVersion: batch/v1
kind: Job
metadata:
  name: bloom-scroll-db-init
  namespace: bloom-scroll
  labels:
    app.kubernetes.io/name: bloom-scroll-db-init
    app.kubernetes.io/part-of: bloom-scroll
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
      - name: ghcr-credentials
      initContainers:
      - name: wait-for-postgres
        image: docker.io/library/busybox:1.36
        command: ['sh', '-c', 'until nc -z postgres.data.svc.cluster.local 5432; do echo waiting for postgres; sleep 2; done']
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
      containers:
      - name: db-init
        image: ghcr.io/madfam-org/bloom-scroll/api:latest
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: bloom-scroll-secrets
              key: DATABASE_URL
        command:
        - sh
        - -c
        - |
          # Enable required PostgreSQL extensions
          python -c "
          import sqlalchemy, os
          engine = sqlalchemy.create_engine(os.environ['DATABASE_URL'].replace('+asyncpg', ''))
          with engine.connect() as conn:
              conn.execute(sqlalchemy.text('CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\"'))
              conn.execute(sqlalchemy.text('CREATE EXTENSION IF NOT EXISTS vector'))
              conn.execute(sqlalchemy.text('CREATE EXTENSION IF NOT EXISTS btree_gin'))
              conn.commit()
          print('Extensions enabled: uuid-ossp, vector, btree_gin')
          "
          # Run Alembic migrations
          alembic upgrade head
          echo "Database initialization complete"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
