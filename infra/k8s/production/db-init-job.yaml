apiVersion: batch/v1
kind: Job
metadata:
  name: bloom-scroll-db-init
  namespace: bloom-scroll
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    app.kubernetes.io/name: bloom-scroll-db-init
    app.kubernetes.io/part-of: bloom-scroll
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bloom-scroll-db-init
        app.kubernetes.io/part-of: bloom-scroll
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
      - name: ghcr-credentials
      initContainers:
      - name: wait-for-postgres
        image: docker.io/library/busybox:1.36
        command: ['sh', '-c', 'until nc -z postgres.data.svc.cluster.local 5432; do echo waiting for postgres; sleep 2; done']
        resources:
          requests:
            cpu: "10m"
            memory: "32Mi"
          limits:
            cpu: "100m"
            memory: "64Mi"
        securityContext:
          privileged: false
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
      containers:
      - name: db-init
        image: ghcr.io/madfam-org/bloom-scroll/api:latest
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: bloom-scroll-secrets
              key: DATABASE_URL
        command:
        - sh
        - -c
        - |
          # Fail loudly: without -e a failed alembic step still exited 0,
          # masking an unapplied migration (2026-07-16 feed outage).
          set -eu
          # Enable required PostgreSQL extensions
          python -c "
          import sqlalchemy, os
          engine = sqlalchemy.create_engine(os.environ['DATABASE_URL'].replace('+asyncpg', ''))
          with engine.connect() as conn:
              conn.execute(sqlalchemy.text('CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\"'))
              conn.execute(sqlalchemy.text('CREATE EXTENSION IF NOT EXISTS vector'))
              conn.execute(sqlalchemy.text('CREATE EXTENSION IF NOT EXISTS btree_gin'))
              conn.commit()
          print('Extensions enabled: uuid-ossp, vector, btree_gin')
          "
          # Run Alembic migrations
          alembic upgrade head
          echo "Database initialization complete"
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        securityContext:
          privileged: false
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
