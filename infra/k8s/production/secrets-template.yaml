# Bloom Scroll Secrets Template -- NEVER commit with real values
# Use: kubectl create secret generic bloom-scroll-secrets --namespace=bloom-scroll --from-literal=...
#
# Required:
#   DATABASE_URL, REDIS_URL
#   INGEST_API_KEY  (service key for bloom-scroll-ingest CronJob; the API
#                    verifies the X-API-Key header against it. Generate with
#                    `openssl rand -hex 32`. Empty disables the key path and
#                    the CronJob will get 401s.)
#
# Optional:
#   EMBEDDING_MODEL, SENTRY_DSN
---
apiVersion: v1
kind: Secret
metadata:
  name: bloom-scroll-secrets
  namespace: bloom-scroll
type: Opaque
stringData:
  # Database (shared Postgres in data namespace)
  DATABASE_URL: "postgresql://bloom:<PASSWORD>@pgbouncer.data.svc.cluster.local:6432/bloom_scroll"
  REDIS_URL: "redis://redis.data.svc.cluster.local:6379"

  # ML Embeddings
  EMBEDDING_MODEL: "all-MiniLM-L6-v2"
  EMBEDDING_DIMENSION: "384"

  # Feed Configuration
  DAILY_FEED_LIMIT: "20"
  DIVERSITY_THRESHOLD: "0.3"
  SERENDIPITY_FACTOR: "0.5"

  # Service auth for the ingestion CronJob (see ingest-cronjob.yaml)
  INGEST_API_KEY: "<GENERATE: openssl rand -hex 32>"

  # Selva LLM gateway for perspective scoring (dormant while empty).
  # SELVA_BASE_URL example: http://nexus-api.selva-office.svc.cluster.local/v1
  SELVA_BASE_URL: ""
  SELVA_API_KEY: ""
  SELVA_SCORING_MODEL: "selva-default"

  # Observability
  SENTRY_DSN: ""

  # App
  PYTHON_ENV: "production"
