apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: bloom-scroll
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: bloom-scroll
  policyTypes: [Ingress, Egress]
---
# Cloudflared is the trust boundary — explicit per-port allowlists
# silently drop traffic on every containerPort change. See
# status.enclii.dev incident 2026-05-04.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cloudflared-ingress
  namespace: bloom-scroll
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: bloom-scroll
  policyTypes: [Ingress]
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: cloudflare-tunnel
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: bloom-scroll
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: bloom-scroll
  policyTypes: [Egress]
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-data-egress
  namespace: bloom-scroll
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: bloom-scroll
  policyTypes: [Egress]
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: data
    ports:
    - port: 5432
    - port: 6432
    - port: 6379
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-https-egress
  namespace: bloom-scroll
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: bloom-scroll
  policyTypes: [Egress]
  egress:
  - ports:
    - port: 443
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: bloom-scroll
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: bloom-scroll
  policyTypes: [Ingress, Egress]
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/part-of: bloom-scroll
  egress:
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/part-of: bloom-scroll
---
# Prometheus (kube-prometheus-stack, monitoring namespace) scrapes
# /metrics on the API pods (2026-07-16 plan, Phase 4). The endpoint
# additionally refuses requests that arrive via Cloudflare (CF headers),
# so the public hostname cannot read it.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-scrape
  namespace: bloom-scroll
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: bloom-scroll
  policyTypes: [Ingress]
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
    ports:
    - port: 8000
      protocol: TCP
