apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: bloom-scroll
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: bloom-scroll
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cloudflared-ingress
  namespace: bloom-scroll
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: bloom-scroll
  policyTypes: [Ingress]
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: cloudflare-tunnel
    ports:
    # api container (FastAPI)
    - port: 8000
      protocol: TCP
    # web container (nginx non-root — can't bind <1024 as uid 1001, so
    # listens on 8080 per frontend/Dockerfile). NetworkPolicy `ports`
    # matches the destination pod port, not the Service port, so
    # port 80 alone leaves the tunnel blocked from reaching the web pod.
    - port: 8080
      protocol: TCP
    # legacy: kept for any service still binding 80 at pod level.
    - port: 80
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: bloom-scroll
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: bloom-scroll
  policyTypes: [Egress]
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-data-egress
  namespace: bloom-scroll
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: bloom-scroll
  policyTypes: [Egress]
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: data
    ports:
    - port: 5432
    - port: 6432
    - port: 6379
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-https-egress
  namespace: bloom-scroll
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: bloom-scroll
  policyTypes: [Egress]
  egress:
  - ports:
    - port: 443
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: bloom-scroll
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: bloom-scroll
  policyTypes: [Ingress, Egress]
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/part-of: bloom-scroll
  egress:
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/part-of: bloom-scroll
