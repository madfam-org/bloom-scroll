apiVersion: apps/v1
kind: Deployment
metadata:
  name: bloom-scroll-api
  namespace: bloom-scroll
  labels:
    app: bloom-scroll-api
    app.kubernetes.io/name: bloom-scroll-api
    app.kubernetes.io/part-of: bloom-scroll
spec:
  replicas: 2
  # Surge-free rollout: the cluster is CPU-constrained and surge pods have
  # blocked rollouts before (2026-06-14 break-glass rollback). Replacing one
  # pod at a time within the existing CPU budget keeps 1/2 replicas serving.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: bloom-scroll-api
  template:
    metadata:
      labels:
        app: bloom-scroll-api
        app.kubernetes.io/name: bloom-scroll-api
        app.kubernetes.io/part-of: bloom-scroll
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
      - name: ghcr-credentials
      containers:
      - name: bloom-scroll-api
        image: ghcr.io/madfam-org/bloom-scroll/api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        # Must match backend/app/main.py docs gate so /docs, /redoc, and
        # /openapi.json are disabled in production.
        - name: ENV
          value: production
        - name: ENVIRONMENT
          value: production
        # torch's default_cache_dir() calls getpwuid() which 502s when
        # runAsUser (1001) has no /etc/passwd entry (Dockerfile creates
        # only uid 1000). Hardcode the cache dir + HOME to sidestep.
        - name: HOME
          value: /tmp
        - name: TORCHINDUCTOR_CACHE_DIR
          value: /tmp/torchinductor
        - name: TRANSFORMERS_CACHE
          value: /tmp/hf-cache
        - name: HF_HOME
          value: /tmp/hf-cache
        envFrom:
        - secretRef:
            name: bloom-scroll-secrets
            optional: true
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            # torch + sentence-transformers resident set sits close to the
            # old 1Gi ceiling; headroom rules out OOM kills as a source of
            # the 2026-05-04 restart flapping.
            memory: "1536Mi"
        securityContext:
          privileged: false
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 10
        # Liveness deliberately avoids /health: that endpoint performs live
        # DB checks, so a shared-Postgres blip >= failureThreshold * period
        # was killing healthy pods (suspected cause of the 2026-05-04
        # 14+11 restarts/47h flapping). /livez is process-alive only;
        # readiness (/health) still pulls pods from rotation on DB loss.
        livenessProbe:
          httpGet:
            path: /livez
            port: 8000
          periodSeconds: 30
