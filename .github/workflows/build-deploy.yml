name: Build & Deploy

# Caller for the shared reusable workflow in madfam-org/enclii.
# See: https://github.com/madfam-org/enclii/blob/main/docs/reusable-workflows.md
#
# Per-service `context` is required here because bloom-scroll's
# Dockerfiles live inside subdirectories (backend/, frontend/) with
# COPY paths relative to those subdirs rather than the repo root.

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**']
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-publish:
    uses: madfam-org/enclii/.github/workflows/build-publish.yml@main
    with:
      image_prefix: ghcr.io/madfam-org/bloom-scroll
      kustomization_path: infra/k8s/production
      services: |
        [
          {"name":"api", "context":"backend",  "dockerfile":"backend/Dockerfile",  "paths":"backend"},
          {"name":"web", "context":"frontend", "dockerfile":"frontend/Dockerfile", "paths":"frontend"}
        ]
    secrets: inherit
    permissions:
      contents: write
      packages: write
      id-token: write
