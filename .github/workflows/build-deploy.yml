name: Build & Deploy

# Caller for the shared reusable workflow in madfam-org/enclii.
# See: https://github.com/madfam-org/enclii/blob/main/docs/reusable-workflows.md
#
# Per-service `context` is required here because bloom-scroll's
# Dockerfiles live inside subdirectories (backend/, frontend/) with
# COPY paths relative to those subdirs rather than the repo root.

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**']
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-publish:
    uses: madfam-org/enclii/.github/workflows/build-publish.yml@main
    with:
      image_prefix: ghcr.io/madfam-org/bloom-scroll
      kustomization_path: infra/k8s/production
      services: |
        [
          {"name":"api", "context":"backend",  "dockerfile":"backend/Dockerfile",  "paths":"backend"},
          {"name":"web", "context":"frontend", "dockerfile":"frontend/Dockerfile", "paths":"frontend",
           "build_args":"API_BASE_URL=https://api.almanac.solar"}
        ]
    secrets: inherit
    permissions:
      contents: write
      packages: write
      id-token: write

  prod-smoke:
    name: Production Smoke
    runs-on: ubuntu-latest
    needs: build-publish
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Run production smoke checks (poll until rollout lands)
        # A fixed sleep races the rollout: ArgoCD reconcile alone can take
        # ~3 min before the PreSync db-init hook and rolling update even
        # start (2026-07-16: smoke ran against the previous revision and
        # failed while the sync was still queued). Poll to a deadline.
        run: |
          deadline=$((SECONDS + 600))
          until scripts/prod-smoke.sh; do
            if (( SECONDS >= deadline )); then
              echo "ERROR: smoke checks still failing after 10 minutes" >&2
              exit 1
            fi
            echo "Smoke not green yet; retrying in 30s..."
            sleep 30
          done
