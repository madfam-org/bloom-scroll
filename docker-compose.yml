services:
  # Bloom Scroll API (FastAPI). This root compose file is a lightweight
  # compatibility entrypoint; infrastructure/docker-compose*.yml remains the
  # canonical local infrastructure path.
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5200:8000"
    environment:
      - PYTHON_ENV=development
      - DATABASE_URL=postgresql://bloom:bloom_dev@postgres:5432/bloom_dev
      - REDIS_URL=redis://redis:6379/0
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - LOG_LEVEL=DEBUG
    volumes:
      - ./backend:/app
      - /app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bloom-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # PostgreSQL Database with pgvector
  postgres:
    image: pgvector/pgvector:pg15
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=bloom
      - POSTGRES_PASSWORD=bloom_dev
      - POSTGRES_DB=bloom_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bloom -d bloom_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bloom-network

  # Redis
  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bloom-network

volumes:
  postgres_data:
  redis_data:

networks:
  bloom-network:
    driver: bridge
